name: deploy-pages

triggers:
  push:

jobs:
  deploy:
    image: alios-8u
    steps:
      - uses: checkout                            # 下载代码
      - uses: deploy-pages                        # 部署到Aone Pages
        inputs:
          deploy-dir: ./                      # 构建后的静态资源目录
          production-branch: master               # 触发部署[正式版本]的分支，否则为[预览版本]
          site-name: wan-dancer-project                 # Aone Pages站点名称